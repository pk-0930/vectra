name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "vectra-ui/**"
      - ".github/workflows/azure-static-web-apps-black-desert-0265d2900.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - "vectra-ui/**"
      - ".github/workflows/azure-static-web-apps-black-desert-0265d2900.yml"

jobs:
  validate_pull_request:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Validate Pull Request
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vectra-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: vectra-ui
        run: npm ci

      - name: Lint frontend
        working-directory: vectra-ui
        run: npm run lint

      - name: Build frontend
        working-directory: vectra-ui
        run: npm run build

  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_DESERT_0265D2900 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./vectra-ui" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
